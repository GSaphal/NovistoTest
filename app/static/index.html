<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Novisto Internal Portal</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --panel: #ffffff;
    --text: #1c1c1e;
    --muted: #6e6e73;
    --border: #e0e0e3;
    --user-bubble: #2563eb;
    --user-text: #ffffff;
    --assistant-bubble: #ffffff;
    --error-bubble: #fde2e1;
    --error-text: #7a1f1a;
    --citation-bg: #eef2ff;
    --citation-text: #3730a3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --panel: #2c2c2e;
      --text: #f5f5f7;
      --muted: #a1a1a6;
      --border: #3a3a3c;
      --assistant-bubble: #3a3a3c;
      --error-bubble: #4c2320;
      --error-text: #f5b8b3;
      --citation-bg: #312e81;
      --citation-text: #c7d2fe;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; }
  #identity { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  select {
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.assistant, .row.error { justify-content: flex-start; }
  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.45;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
  .row.assistant .bubble { background: var(--assistant-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .row.error .bubble { background: var(--error-bubble); color: var(--error-text); border-bottom-left-radius: 4px; }
  .citations {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .citation {
    background: var(--citation-bg);
    color: var(--citation-text);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    cursor: default;
  }
  .citations-empty {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  form {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 14px;
  }
  button {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--user-bubble);
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .thinking { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>Internal Knowledge Assistant</h1>
  <div id="identity">
    <label for="token">Asking as</label>
    <select id="token"></select>
  </div>
</header>

<div id="chat"></div>

<form id="composer">
  <input id="question" type="text" placeholder="Ask a question..." autocomplete="off" />
  <button type="submit">Send</button>
</form>

<script>
  // Demo identities from data/users.json -- static tokens, not real credentials.
  const DEMO_USERS = [
    { label: "Maria (Marketing)", token: "tok_marketing_demo" },
    { label: "Sam (Sales)", token: "tok_sales_demo" },
    { label: "Priya (People/HR)", token: "tok_people_demo" },
    { label: "Erin (Exec)", token: "tok_exec_demo" },
  ];

  const chat = document.getElementById("chat");
  const form = document.getElementById("composer");
  const input = document.getElementById("question");
  const tokenSelect = document.getElementById("token");
  const sendButton = form.querySelector("button");

  for (const user of DEMO_USERS) {
    const opt = document.createElement("option");
    opt.value = user.token;
    opt.textContent = user.label;
    tokenSelect.appendChild(opt);
  }

  function addRow(role, render) {
    const row = document.createElement("div");
    row.className = `row ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    render(bubble);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function renderCitations(container, citations) {
    if (!citations || citations.length === 0) {
      const empty = document.createElement("div");
      empty.className = "citations-empty";
      empty.textContent = "No citations returned.";
      container.appendChild(empty);
      return;
    }
    const wrap = document.createElement("div");
    wrap.className = "citations";
    const seen = new Set();
    for (const c of citations) {
      if (seen.has(c.doc_id)) continue;
      seen.add(c.doc_id);
      const pill = document.createElement("span");
      pill.className = "citation";
      pill.textContent = c.title ? `${c.title} (${c.doc_id})` : c.doc_id;
      wrap.appendChild(pill);
    }
    container.appendChild(wrap);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addRow("user", (bubble) => { bubble.textContent = question; });
    input.value = "";
    input.disabled = true;
    sendButton.disabled = true;

    const thinkingBubble = addRow("assistant", (bubble) => {
      bubble.classList.add("thinking");
      bubble.textContent = "Thinking...";
    });

    try {
      const res = await fetch("/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${tokenSelect.value}`,
        },
        body: JSON.stringify({ question }),
      });

      const data = await res.json().catch(() => ({}));
      thinkingBubble.classList.remove("thinking");

      if (!res.ok) {
        thinkingBubble.parentElement.classList.remove("assistant");
        thinkingBubble.parentElement.classList.add("error");
        thinkingBubble.textContent = data.detail || `Request failed (${res.status})`;
      } else {
        thinkingBubble.textContent = data.answer || "(empty answer)";
        renderCitations(thinkingBubble, data.citations);
      }
    } catch (err) {
      thinkingBubble.classList.remove("thinking");
      thinkingBubble.parentElement.classList.remove("assistant");
      thinkingBubble.parentElement.classList.add("error");
      thinkingBubble.textContent = `Network error: ${err.message}`;
    } finally {
      input.disabled = false;
      sendButton.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
